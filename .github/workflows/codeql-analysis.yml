# For most projects, this workflow file will not need changing; you simply need
# to commit it to your repository.
#
# You may wish to alter this file to override the set of languages analyzed,
# or to provide custom queries or build logic.
#
# ******** NOTE ********
# We have attempted to detect the languages in your repository. Please check
# the `language` matrix defined below to confirm you have the correct set of
# supported CodeQL languages.
#
name: "CodeQL"

on:
  push:
    branches: [ main ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ main ]
  schedule:
    - cron: '42 15 * * 1'

jobs:
  analyze:
    name: Analyze
    runs-on: windows-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v1
      with:
        queries: security-and-quality
        languages: csharp

    - name: Build solution
      shell: pwsh
      run: |
        $pathToSolution = "src/Microsoft.Security.Utilities.sln"
        $buildConfiguration = "Release"
        $useSharedCompilation = "false"
        $testProjects = "src/Tests.Marvin/Tests.Marvin.csproj"

        dotnet nuget locals all --clear

        # remove one or more test projects, 
        # so that CodeQL only analyzes the source code
        dotnet sln $pathToSolution remove $testProjects

        dotnet clean $pathToSolution `
        --configuration $buildConfiguration

        dotnet restore $pathToSolution

        dotnet build $pathToSolution `
        -property:UseSharedCompilation=$useSharedCompilation `
        --configuration $buildConfiguration `
        --no-incremental `
        --no-restore

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v1
